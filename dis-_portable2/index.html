e eliminan tareas manuales y reducen errores en procesos críticos."},{title:"Procesamiento de datos a escala",description:"Fortaleciendo mi perfil en manejo de grandes volúmenes de datos con Python, SQL Server Management Studio y AWS Athena para análisis, transformación, validación y explotación de información."},{title:"Experiencia corporativa comprobada",description:"Participación en proyectos para BancoEstado, Cencosud Scotiabank, ACL Tecnología, Getronics y Carozzi — desde certificación contable hasta soporte de plataformas empresariales."},{title:"Visión técnica orientada a resultados",description:"Combino experiencia práctica en procesos corporativos con un enfoque técnico centrado en trazabilidad, eficiencia y calidad de datos."}]},Qx={"Lenguajes y desarrollo":["Python","SQL","JavaScript","Regex"],"Datos y análisis":["SQL Server Management Studio","AWS Athena","PostgreSQL","pandas","openpyxl","SQLAlchemy","APIs REST"],"Automatización y ETL":["UiPath","Pentaho PDI","Selenium","Robocorp","Playwright","Power Automate"],"Dev / Herramientas":["Git","GitHub","Docker","GitHub Actions","PyInstaller","Excel Avanzado"]},Yx=[{title:"Bot RPA de extracción tributaria (SII F29)",problem:"La consulta mensual del Formulario 29 para decenas de contribuyentes se hacía manualmente en el portal del SII, consumiendo horas de trabajo y generando errores frecuentes.",solution:"Desarrollé un bot en Python con Selenium que automatiza el login, navegación, extracción de códigos tributarios y escritura de resultados en Excel. Incluye GUI, reanudación automática y generación de portable .exe para usuarios finales.",technologies:["Python","Selenium","tkinter","openpyxl","PyInstaller"],impact:"Proceso que tomaba un día completo de trabajo manual ahora se ejecuta de forma desatendida. Eliminación de errores de transcripción y trazabilidad completa de cada ejecución."},{title:"Pipeline ETL de contabilidad automática",problem:"La generación de contabilidad a partir de datos de producción requería procesamiento manual de múltiples fuentes, cruces complejos y era propenso a inconsistencias.",solution:"Construí un sistema orquestado con múltiples módulos ETL en Python que procesa datos masivos, ejecuta comparadores contables, cruza subsidiarios y genera consolidados automáticos contra PostgreSQL.",technologies:["Python","PostgreSQL","pandas","PLpgSQL","Jupyter"],impact:"Automatización completa de un proceso contable crítico. Reducción significativa de tiempo de procesamiento y detección temprana de inconsistencias entre fuentes."},{title:"Consolidación y validación de subsidiarios",problem:"La validación diaria de subsidiarios contables requería cruzar múltiples archivos, aplicar reglas de clasificación y consolidar resultados — todo manualmente.",solution:"Diseñé un flujo maestro de 7 etapas: archivado, preparación, inserción, enriquecimiento con cuentas/eventos, cruce TXP, cuadratura MCF y consolidación histórica. Orquestado con flags de ejecución y rutas alternativas.",technologies:["Python","SQLAlchemy","openpyxl","PostgreSQL","Excel COM"],impact:"Proceso diario que antes tomaba horas de trabajo manual ahora se ejecuta con un solo comando. Cuadraturas automáticas y consolidación histórica sin intervención."},{title:"Sistema de conciliación de datos financieros",problem:"La operación necesitaba cruzar información de múltiples fuentes financieras para detectar diferencias, pero el proceso era lento, manual y difícil de auditar.",solution:"Implementé soluciones de cruce automatizado entre bases de datos, archivos Excel y reportes, con reglas de validación específicas y generación de reportes de diferencias.",technologies:["SQL","Python","PostgreSQL","pandas"],impact:"Detección automática de inconsistencias que antes pasaban desapercibidas. Trazabilidad completa del proceso de conciliación."},{title:"ETL Conciliación Bancaria — Dashboard Interactivo",problem:"La conciliación entre registros contables y extractos bancarios requería cruces manuales entre archivos con formatos distintos (encoding, delimitadores, formatos de fecha y montos), sin visibilidad consolidada de diferencias ni análisis estadístico.",solution:"Construí un pipeline ETL completo en Python con 7 etapas automatizadas: generación de datos sintéticos, validación de estructura, extracción con detección automática de encoding, normalización, match por código de operación, reportes CSV y dashboard HTML interactivo con Chart.js. Incluye CI/CD con GitHub Actions que ejecuta tests, corre el pipeline y publica el dashboard en GitHub Pages.",technologies:["Python","pandas","matplotlib","Chart.js","GitHub Actions","GitHub Pages","pytest"],impact:"Pipeline ejecuta en menos de 2 segundos. Dashboard interactivo con gráficos, tablas filtrables/ordenables, búsqueda en tiempo real y navegación por secciones. 17 tests automatizados. Deploy continuo a GitHub Pages."},{title:"Web Scraper Indicadores Previsionales — Dashboard Interactivo",problem:"Los indicadores económicos y previsionales de Chile (UF, dólar, UTM, tasas AFP, topes imponibles) cambian constantemente y consultarlos manualmente en Previred no permite visualizar tendencias ni variaciones históricas.",solution:"Construí un Web Scraper automatizado en Python con 7 etapas: extracción desde Previred con reintentos, parsing de formatos chilenos ($1.234.567, 11,44%), almacenamiento como serie temporal en CSV, cálculo de variaciones y tendencias, validación de integridad y dashboard HTML interactivo con Chart.js. Incluye sparklines en KPIs, gráficos de evolución temporal y tabla resumen agrupada por sección. CI/CD con GitHub Actions ejecuta el scraper semanalmente y despliega en GitHub Pages.",technologies:["Python","BeautifulSoup","pandas","Chart.js","GitHub Actions","GitHub Pages","pytest"],impact:"Pipeline ejecuta en menos de 2 segundos. 43 indicadores monitoreados con 26 semanas de historial. Dashboard con 5 secciones interactivas, sparklines de tendencia y filtros. 67 tests automatizados. Scraping semanal automático con deploy continuo."},{title:"API de Validación Tributaria — Chile",problem:"Los cálculos tributarios chilenos (validación de RUT, IVA, retención de honorarios, topes imponibles, declaración F29) requieren conocimiento especializado de normativa vigente y se realizan manualmente con planillas propensas a errores.",solution:"Construí un microservicio REST con FastAPI que expone 11 endpoints documentados con Swagger para validación y cálculo tributario. Incluye módulos puros de lógica tributaria (RUT módulo 11, IVA 19%, retención 2024-2027, cotizaciones AFP/salud/AFC, F29 simplificado), modelos Pydantic validados, Dockerfile y demo HTML interactiva con formularios funcionales desplegada en GitHub Pages.",technologies:["Python","FastAPI","Pydantic","pytest","httpx","Docker","GitHub Actions","GitHub Pages"],impact:"11 endpoints REST documentados con Swagger. 56 tests (unitarios + integración). 5 dominios tributarios implementados. Demo interactiva con formularios que replican la lógica de la API. Deploy continuo a GitHub Pages."},{title:"Detector de Anomalías Financieras — Dashboard Interactivo",problem:"La detección de transacciones sospechosas en datos financieros requiere analizar miles de operaciones simultáneamente, considerando múltiples variables (montos, horarios, frecuencias, destinatarios), algo inviable de forma manual y propenso a errores humanos.",solution:"Construí un sistema de detección de anomalías en Python con 6 etapas automatizadas: generación de ~5.000 transacciones sintéticas con 6 tipos de anomalías inyectadas, validación de integridad, detección con 3 métodos (Z-Score, IQR e Isolation Forest), clasificación de riesgo (bajo/medio/alto/crítico), reportes CSV y dashboard HTML interactivo con Chart.js. El dashboard incluye scatter plot, heatmap hora×día, distribuciones, timeline mensual y tabla de alertas filtrable. CI/CD con GitHub Actions ejecuta tests, pipeline y despliega en GitHub Pages.",technologies:["Python","scikit-learn","pandas","Chart.js","GitHub Actions","GitHub Pages","pytest"],impact:"Pipeline ejecuta en menos de 2 segundos. Precision 83% y F1-Score 57% sobre anomalías conocidas. Dashboard con 7 secciones interactivas, heatmap de patrones temporales y contexto explicativo. 33 tests automatizados. Deploy continuo a GitHub Pages."},{title:"Herramientas internas de productividad",problem:"Equipos operativos dedicaban tiempo significativo a tareas repetitivas que podían estandarizarse y automatizarse con herramientas simples.",solution:"Desarrollé utilidades en Python y JavaScript para procesamiento de archivos, traducción de documentos, análisis de datos y estandarización de tareas operativas recurrentes.",technologies:["Python","JavaScript","APIs","Google Sheets"],impact:"Reducción de tiempos en tareas rutinarias y estandarización de procesos que antes dependían de criterio individual."}],qx=[{metric:"Procesos manuales eliminados",description:"Automatización de flujos completos que antes requerían horas de trabajo manual diario — desde extracción tributaria hasta consolidación contable.",icon:"cog"},{metric:"Errores operativos reducidos",description:"Implementación de validaciones, reglas de negocio y controles automáticos que eliminan la variabilidad humana en procesos críticos.",icon:"shield"},{metric:"Trazabilidad completa",description:"Cada automatización incluye logging, evidencia de ejecución, control de estados y reanudación automática — auditable de principio a fin.",icon:"eye"},{metric:"Tiempo de procesamiento optimizado",description:"Procesos contables y de datos que tomaban un día completo ahora se ejecutan en minutos de forma desatendida.",icon:"zap"},{metric:"Integración de fuentes heterogéneas",description:"Conexión de PostgreSQL, SQL Server, Excel, Google Sheets, APIs y archivos planos en flujos unificados y consistentes.",icon:"link"},{metric:"Herramientas para usuarios finales",description:"Construcción de utilidades con GUI y portables .exe que permiten a equipos no téc
